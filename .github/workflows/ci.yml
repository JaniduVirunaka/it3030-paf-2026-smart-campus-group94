name: Smart Campus Hub CI/CD

on:
  push:
    branches: [ "main", "testing-and-ci" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ─── Job 1: Build & test the Spring Boot backend ────────────────────────────
  build-backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and run all tests
        env:
          SPRING_DATA_MONGODB_URI: mongodb://localhost:27017/dummy_db
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_ID: dummy-client-id
          SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_GOOGLE_CLIENT_SECRET: dummy-client-secret
        run: mvn -B clean verify --file backend/pom.xml

      - name: Publish Surefire test report
        if: always()
        uses: mikepenz/action-junit-report@v4
        with:
          report_paths: backend/target/surefire-reports/TEST-*.xml
          check_name: Backend Unit Tests
          fail_on_failure: true

      - name: Upload Surefire XML reports as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: backend/target/surefire-reports/
          retention-days: 7

      - name: Package JAR (skip tests — already ran above)
        run: mvn -B package -DskipTests --file backend/pom.xml

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar
          retention-days: 7

  # ─── Job 2: Build & test the React frontend ─────────────────────────────────
  build-frontend:
    name: Frontend — Build & Playwright Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Type-check (if tsc is available)
        working-directory: ./frontend
        run: npx tsc --noEmit 2>/dev/null || true

      - name: Build production bundle
        working-directory: ./frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests (Chromium only in CI)
        working-directory: ./frontend
        env:
          CI: true
        run: npx playwright test --project=chromium

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 7

      - name: Upload Playwright test results (JUnit XML)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7
