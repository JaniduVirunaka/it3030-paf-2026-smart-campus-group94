name: Smart Campus Hub CI/CD

# This tells GitHub to run the script whenever code is pushed to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # Job 1: Test the Spring Boot Backend
  build-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up JDK 21
      uses: actions/setup-java@v3
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
        
    - name: Build and Test Spring Boot
      # Update 'backend/pom.xml' if your backend folder has a different name
      run: mvn -B clean install --file backend/pom.xml

# Job 2: Test the React Frontend & Run Playwright
  build-frontend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3
      
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        
    - name: Install Dependencies and Build
      working-directory: ./frontend
      run: |
        npm install
        npm run build

    - name: Install Playwright Browsers
      working-directory: ./frontend
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      working-directory: ./frontend
      # Playwright will automatically run 'npm run dev', wait for port 5173, and run tests!
      run: npx playwright test